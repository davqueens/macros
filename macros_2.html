<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Macros">
<title>Macros</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#020617;color:#f1f5f9;font-family:monospace;min-height:100vh;padding-bottom:40px}
.hdr{background:#0f172a;border-bottom:1px solid #1e293b;padding:18px 16px 0}
.hdr-top{font-size:10px;color:#f97316;letter-spacing:.15em;text-transform:uppercase}
.hdr-title{font-size:22px;font-weight:800;color:#f1f5f9}
.hdr-date{font-size:10px;color:#475569;margin-bottom:10px}
.tabs{display:flex;border-top:1px solid #1e293b}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:#475569;font-family:monospace;font-size:11px;font-weight:700;padding:9px 14px;cursor:pointer;text-transform:uppercase;letter-spacing:.08em}
.tab.active{color:#f97316;border-bottom-color:#f97316}
.wrap{padding:16px;max-width:520px;margin:0 auto}
@media(min-width:600px){body{display:flex;flex-direction:column;align-items:center}.hdr{width:100%;max-width:520px}.wrap{width:100%}}
.pill{display:flex;justify-content:space-between;padding:8px 14px;border-radius:8px;margin-bottom:12px;font-size:11px}
.pill.ok{background:#0f2a1a;border:1px solid #166534;color:#86efac}
.pill.ov{background:#7f1d1d;border:1px solid #ef4444;color:#fca5a5}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.card{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.card.ov{border-color:#7f1d1d}
.ring-box{position:relative;flex-shrink:0;width:54px;height:54px}
.ring-box svg{position:absolute;top:0;left:0}
.ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800}
.clabel{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.1em}
.cval{font-size:19px;font-weight:800;line-height:1.1}
.cval small{font-size:10px;color:#64748b;margin-left:2px}
.csub{font-size:10px;color:#475569}
.csub.ov{color:#ef4444}
.log-box{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px}
.log-hdr{display:flex;justify-content:space-between;margin-bottom:10px}
.log-label{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.1em}
.clr{background:none;border:none;color:#475569;font-family:monospace;font-size:10px;cursor:pointer}
.log-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid #1e293b}
.log-name{font-size:12px;color:#e2e8f0}
.log-sub{font-size:10px;color:#475569;margin-top:2px}
.log-cal{color:#f97316;font-size:13px;font-weight:700}
.rmv{background:none;border:none;color:#475569;font-size:18px;cursor:pointer;padding:0;line-height:1;margin-left:8px}
.log-total{text-align:right;font-size:13px;font-weight:800;color:#f97316;margin-top:10px}
.empty{text-align:center;color:#334155;font-size:12px;padding:30px 0}
.stabs{display:flex;gap:6px;margin-bottom:14px}
.stab{flex:1;background:#0f172a;border:1px solid #1e293b;border-radius:8px;color:#475569;font-family:monospace;font-size:11px;font-weight:700;padding:7px 12px;cursor:pointer}
.stab.active{background:#1e3a5f;border-color:#1e40af;color:#60a5fa}
.list{background:#0f172a;border:1px solid #1e293b;border-radius:10px;overflow:hidden}
.fbtn{width:100%;background:none;border:none;border-bottom:1px solid #1e293b;color:#e2e8f0;font-family:monospace;font-size:12px;padding:12px 14px;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center}
.fbtn:last-child{border-bottom:none}
.fbtn-sub{font-size:10px;color:#475569;margin-top:2px}
.fkcal{color:#f97316;font-size:11px;flex-shrink:0;margin-left:8px}
.bowl-wrap{padding:14px;border-bottom:1px solid #1e293b}
.bowl-top{display:flex;justify-content:space-between;margin-bottom:10px}
.bowl-name{font-size:13px;color:#e2e8f0;font-weight:700}
.bowl-note{font-size:10px;color:#475569;margin-top:2px}
.bowl-kcal{font-size:16px;font-weight:800;color:#f97316}
.bowl-mac{font-size:10px;color:#475569}
.rlabel{font-size:10px;color:#64748b;text-transform:uppercase;margin-bottom:6px}
.rbtns{display:flex;gap:6px;margin-bottom:10px}
.rbtn{flex:1;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#64748b;font-family:monospace;font-size:12px;font-weight:700;padding:8px;cursor:pointer}
.rbtn.active{background:#1e3a5f;border-color:#1e40af;color:#60a5fa}
.btn{border:none;border-radius:8px;font-family:monospace;font-size:12px;font-weight:700;cursor:pointer}
.btn-or{background:#f97316;color:#fff}
.btn-dk{background:#1e293b;color:#94a3b8}
.btn-full{width:100%;padding:9px}
.egg-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid #1e293b}
.egg-name{font-size:12px;color:#e2e8f0}
.egg-note{font-size:10px;color:#475569;margin-top:2px}
.egg-ctrl{display:flex;align-items:center;gap:8px}
.cnt-btn{background:#1e293b;border:none;border-radius:8px;color:#94a3b8;font-size:16px;padding:4px 10px;cursor:pointer}
.cnt-num{color:#f1f5f9;font-size:14px;font-weight:700;min-width:24px;text-align:center}
.custom-box{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px}
.inp{background:#1e293b;border:1px solid #334155;border-radius:8px;color:#f1f5f9;font-family:monospace;font-size:12px;padding:8px 10px;width:100%;outline:none;display:block;margin-bottom:8px}
.ig3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.ig2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.ig3 .inp,.ig2 .inp{margin-bottom:0}
.goals-box{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px}
.g-title{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.g-note{font-size:10px;color:#334155;margin-bottom:14px}
.g-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1e293b}
.g-key{font-size:12px;text-transform:capitalize}
.g-val{color:#f1f5f9;font-weight:700;font-size:13px}
.g-inp{background:#1e293b;border:1px solid #334155;border-radius:8px;color:#f1f5f9;font-family:monospace;font-size:12px;padding:6px 8px;width:90px;text-align:right;outline:none}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn-row .btn{flex:1;padding:9px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">Cut to 215 &middot; 260 start</div>
  <div class="hdr-title">Macros &amp; Fiber</div>
  <div class="hdr-date" id="d"></div>
  <div class="tabs">
    <button class="tab active" id="t-log" onclick="go('log')">Today</button>
    <button class="tab" id="t-add" onclick="go('add')">+ Add</button>
    <button class="tab" id="t-goals" onclick="go('goals')">Goals</button>
  </div>
</div>
<div class="wrap">
  <div id="p-log"></div>
  <div id="p-add" style="display:none"></div>
  <div id="p-goals" style="display:none"></div>
</div>

<script>
var COLORS={calories:"#f97316",protein:"#3b82f6",carbs:"#a855f7",fat:"#eab308",fiber:"#22c55e"};
var UNITS={calories:"kcal",protein:"g",carbs:"g",fat:"g",fiber:"g"};
var DG={calories:2400,protein:215,carbs:185,fat:70,fiber:38};
var BEEF={c:350,p:49,k:0,f:16,b:0};
var RICE={c:100,p:2,k:22,f:0,b:0};
var CORN={c:35,p:1,k:8,f:0,b:1};
var STAPLES=[
  {n:"Protein Shake (Kirkland whey + collagen)",c:185,p:36,k:8,f:3,b:1},
  {n:"Coffee w/ Collagen (1 tbsp)",c:35,p:9,k:0,f:0,b:0},
  {n:"ONE Reese's Protein Bar",c:240,p:18,k:25,f:11,b:3},
  {n:"Kirkland Fiber Supplement (1 tbsp)",c:20,p:0,k:6,f:0,b:5},
  {n:"Kirkland Chocolate Brownie Protein Bar",c:190,p:21,k:22,f:6,b:10},
  {n:"Liquid IV Strawberry (1 packet)",c:45,p:0,k:11,f:0,b:0},
  {n:"Yogurt Bowl (1c Greek yogurt, 1/2c blueberries, 1/4c granola)",c:292,p:26,k:39,f:4,b:4}
];
var FOODS=[
  {n:"Scrambled Eggs (1 large)",c:73,p:6.2,k:0.4,f:5.4,b:0},
  {n:"Fuji Apple (medium)",c:95,p:0.5,k:25,f:0.3,b:4},
  {n:"Chicken Breast (100g)",c:165,p:31,k:0,f:3.6,b:0},
  {n:"Brown Rice (100g cooked)",c:112,p:2.6,k:24,f:0.8,b:1.8},
  {n:"Greek Yogurt (170g)",c:100,p:17,k:6,f:0.7,b:0},
  {n:"Oats (100g dry)",c:389,p:17,k:66,f:7,b:11},
  {n:"Banana (medium)",c:105,p:1.3,k:27,f:0.4,b:3.1},
  {n:"Almonds (28g)",c:164,p:6,k:6,f:14,b:3.5},
  {n:"Salmon (100g)",c:208,p:20,k:0,f:13,b:0},
  {n:"Cottage Cheese (100g)",c:98,p:11,k:3.4,f:4.3,b:0},
  {n:"Sweet Potato (medium)",c:103,p:2.3,k:24,f:0.1,b:3.8},
  {n:"Ground Beef 93% lean (100g)",c:152,p:26,k:0,f:5.6,b:0}
];

var today=new Date().toISOString().split("T")[0];
document.getElementById("d").textContent=today;
var LK="ml-"+today, GK="mg2";
var entries=[], goals=Object.assign({},DG), curTab="log", curSub="staples", edGoals=false, eggs=1, rice="half";

try{var ld=localStorage.getItem(LK);if(ld)entries=JSON.parse(ld);}catch(e){}
try{var lg=localStorage.getItem(GK);if(lg)goals=JSON.parse(lg);}catch(e){}

function sl(){try{localStorage.setItem(LK,JSON.stringify(entries));}catch(e){}}
function sg(){try{localStorage.setItem(GK,JSON.stringify(goals));}catch(e){}}

function tot(){
  return entries.reduce(function(a,e){
    return{cal:a.cal+(e.c||0),pro:a.pro+(e.p||0),car:a.car+(e.k||0),fat:a.fat+(e.f||0),fib:a.fib+(e.b||0)};
  },{cal:0,pro:0,car:0,fat:0,fib:0});
}

function ring(val,max,col,size,stroke){
  size=size||54;stroke=stroke||5;
  var r=(size-stroke)/2,c=2*Math.PI*r,pct=Math.min(val/max,1),ov=val>max,sc=ov?"#ef4444":col;
  return '<svg width="'+size+'" height="'+size+'" style="transform:rotate(-90deg)" viewBox="0 0 '+size+' '+size+'">'
    +'<circle cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" fill="none" stroke="#1e293b" stroke-width="'+stroke+'"/>'
    +'<circle cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" fill="none" stroke="'+sc+'" stroke-width="'+stroke+'" stroke-dasharray="'+(pct*c)+' '+c+'" stroke-linecap="round"/>'
    +'</svg>';
}

function card(key,val,goal){
  var col=COLORS[key],unit=UNITS[key],pct=Math.round(val/goal*100),ov=val>goal;
  var sub=ov?'<div class="csub ov">+'+Math.round(val-goal)+' over &middot; goal '+goal+unit+'</div>'
            :'<div class="csub">'+Math.round(goal-val)+' left &middot; goal '+goal+unit+'</div>';
  return '<div class="card'+(ov?' ov':'')+'">'
    +'<div class="ring-box">'+ring(val,goal,col)+'<div class="ring-pct" style="color:'+(ov?'#ef4444':col)+'">'+pct+'%</div></div>'
    +'<div><div class="clabel">'+key+'</div><div class="cval" style="color:#f1f5f9">'+Math.round(val)+'<small>'+unit+'</small></div>'+sub+'</div>'
    +'</div>';
}

function renderLog(){
  var t=tot();
  var cl=Math.round(goals.calories-t.cal),pl=Math.round(goals.protein-t.pro);
  var h="";
  if(entries.length>0){
    h+='<div class="pill '+(cl<0?'ov':'ok')+'">'
      +'<span>'+(cl<0?Math.abs(cl)+' kcal over':cl+' kcal remaining')+'</span>'
      +'<span style="color:'+(pl<=0?'#86efac':'#94a3b8')+'">'+(pl<=0?'&#10003; Protein hit!':pl+'g protein to go')+'</span>'
      +'</div>';
  }
  h+='<div class="cards">'
    +'<div style="grid-column:1/-1">'+card('calories',Math.round(t.cal),goals.calories)+'</div>'
    +card('protein',Math.round(t.pro),goals.protein)
    +card('carbs',Math.round(t.car),goals.carbs)
    +card('fat',Math.round(t.fat),goals.fat)
    +card('fiber',Math.round(t.fib),goals.fiber)
    +'</div>';
  if(entries.length===0){
    h+='<div class="empty">Nothing logged &mdash; tap + Add to start.</div>';
  } else {
    h+='<div class="log-box"><div class="log-hdr"><span class="log-label">Today\'s Log</span><button class="clr" onclick="clrLog()">Clear all</button></div>';
    for(var i=0;i<entries.length;i++){
      var e=entries[i];
      h+='<div class="log-row"><div style="flex:1;padding-right:8px"><div class="log-name">'+e.n+'</div>'
        +'<div class="log-sub">P:'+e.p+'g &middot; C:'+e.k+'g &middot; F:'+e.f+'g &middot; Fib:'+e.b+'g</div></div>'
        +'<div style="display:flex;align-items:center"><span class="log-cal">'+e.c+'</span>'
        +'<button class="rmv" onclick="rmv('+i+')">&#215;</button></div></div>';
    }
    h+='<div class="log-total">'+Math.round(t.cal)+' / '+goals.calories+' kcal</div></div>';
  }
  document.getElementById("p-log").innerHTML=h;
}

function bowlTot(){
  var rm=rice==="half"?RICE:{c:200,p:4,k:44,f:0,b:0};
  return{c:BEEF.c+rm.c+CORN.c,p:BEEF.p+rm.p+CORN.p,k:BEEF.k+rm.k+CORN.k,f:BEEF.f,b:CORN.b};
}

function renderAdd(){
  var bt=bowlTot();
  var h='<div class="stabs">'
    +'<button class="stab'+(curSub==="staples"?" active":"")+'" onclick="sub(\'staples\')">My Staples</button>'
    +'<button class="stab'+(curSub==="other"?" active":"")+'" onclick="sub(\'other\')">Common</button>'
    +'<button class="stab'+(curSub==="custom"?" active":"")+'" onclick="sub(\'custom\')">Custom</button>'
    +'</div>';
  if(curSub==="staples"){
    h+='<div class="list">'
      +'<div class="bowl-wrap">'
      +'<div class="bowl-top"><div><div class="bowl-name">Beef Bowl</div><div class="bowl-note">1 cup 88% beef &middot; 1/4 cup corn</div></div>'
      +'<div style="text-align:right"><div class="bowl-kcal">'+bt.c+' kcal</div><div class="bowl-mac">P:'+bt.p+'g &middot; C:'+bt.k+'g &middot; F:'+bt.f+'g</div></div></div>'
      +'<div class="rlabel">Jasmine Rice</div>'
      +'<div class="rbtns">'
      +'<button class="rbtn'+(rice==="half"?" active":"")+'" onclick="setRice(\'half\')">1/2 cup</button>'
      +'<button class="rbtn'+(rice==="full"?" active":"")+'" onclick="setRice(\'full\')">1 cup</button>'
      +'</div>'
      +'<button class="btn btn-or btn-full" onclick="addBowl()">Add to Log</button>'
      +'</div>'
      +'<div class="egg-row">'
      +'<div><div class="egg-name">Scrambled Eggs</div><div class="egg-note">73 kcal &middot; 6.2g P each</div></div>'
      +'<div class="egg-ctrl">'
      +'<button class="cnt-btn" onclick="setEggs('+(Math.max(1,eggs-1))+')">&#8722;</button>'
      +'<span class="cnt-num">'+eggs+'</span>'
      +'<button class="cnt-btn" onclick="setEggs('+(eggs+1)+')">+</button>'
      +'<button class="btn btn-or" style="padding:7px 14px" onclick="addEggs()">Add</button>'
      +'</div></div>';
    for(var i=0;i<STAPLES.length;i++){
      var s=STAPLES[i];
      h+='<button class="fbtn" onclick="addItem('+i+',\'s\')"><span>'+s.n+'</span><span class="fkcal">'+s.c+' kcal</span></button>';
    }
    h+='</div>';
  } else if(curSub==="other"){
    h+='<div class="list">';
    for(var j=0;j<FOODS.length;j++){
      var fd=FOODS[j];
      h+='<button class="fbtn" onclick="addItem('+j+',\'f\')">'
        +'<div><div>'+fd.n+'</div><div class="fbtn-sub">P:'+fd.p+'g &middot; C:'+fd.k+'g &middot; F:'+fd.f+'g &middot; Fib:'+fd.b+'g</div></div>'
        +'<span class="fkcal">'+fd.c+' kcal</span></button>';
    }
    h+='</div>';
  } else {
    h+='<div class="custom-box">'
      +'<input class="inp" id="cn" placeholder="Food name">'
      +'<div class="ig3"><input class="inp" id="cc" type="number" placeholder="Calories"><input class="inp" id="cp" type="number" placeholder="Protein"><input class="inp" id="ck" type="number" placeholder="Carbs"></div>'
      +'<div class="ig2"><input class="inp" id="cf" type="number" placeholder="Fat"><input class="inp" id="cb" type="number" placeholder="Fiber"></div>'
      +'<button class="btn btn-or btn-full" onclick="addCustom()">Add to Log</button>'
      +'</div>';
  }
  document.getElementById("p-add").innerHTML=h;
}

function renderGoals(){
  var keys=["calories","protein","carbs","fat","fiber"];
  var h='<div class="goals-box"><div class="g-title">Daily Goals</div><div class="g-note">260 to 215 cut &middot; heavy lifting 6x/week</div>';
  for(var i=0;i<keys.length;i++){
    var k=keys[i];
    h+='<div class="g-row"><span class="g-key" style="color:'+COLORS[k]+'">'+k+'</span>'
      +(edGoals?'<input class="g-inp" id="gi-'+k+'" type="number" value="'+goals[k]+'">'
               :'<span class="g-val">'+goals[k]+' '+UNITS[k]+'</span>')
      +'</div>';
  }
  h+='<div class="btn-row">'
    +(edGoals
      ?'<button class="btn btn-or" onclick="saveGoals()">Save</button><button class="btn btn-dk" onclick="cancelGoals()">Cancel</button>'
      :'<button class="btn btn-dk" onclick="editGoals()">Edit Goals</button>')
    +'</div></div>';
  document.getElementById("p-goals").innerHTML=h;
}

function render(){renderLog();renderAdd();renderGoals();}

function go(t){
  curTab=t;
  ["log","add","goals"].forEach(function(id){
    document.getElementById("t-"+id).className="tab"+(id===t?" active":"");
    document.getElementById("p-"+id).style.display=id===t?"block":"none";
  });
  render();
}

function sub(s){curSub=s;renderAdd();}
function setRice(r){rice=r;renderAdd();}
function setEggs(n){eggs=n;renderAdd();}

function push(e){entries.push(e);sl();go("log");}

function addItem(i,type){
  var s=type==="s"?STAPLES[i]:FOODS[i];
  push({n:s.n,c:s.c,p:s.p,k:s.k,f:s.f,b:s.b});
}

function addBowl(){
  var rm=rice==="half"?RICE:{c:200,p:4,k:44,f:0,b:0};
  push({n:"Beef Bowl ("+(rice==="half"?"1/2":"1")+" cup rice)",c:BEEF.c+rm.c+CORN.c,p:BEEF.p+rm.p+CORN.p,k:BEEF.k+rm.k+CORN.k,f:BEEF.f,b:CORN.b});
}

function addEggs(){
  var fd=FOODS[0];
  push({n:fd.n+(eggs>1?" x"+eggs:""),c:Math.round(fd.c*eggs),p:Math.round(fd.p*eggs*10)/10,k:Math.round(fd.k*eggs*10)/10,f:Math.round(fd.f*eggs*10)/10,b:Math.round(fd.b*eggs*10)/10});
}

function addCustom(){
  var n=document.getElementById("cn").value;
  var c=+document.getElementById("cc").value;
  if(!n||!c)return;
  push({n:n,c:c,p:+(document.getElementById("cp").value)||0,k:+(document.getElementById("ck").value)||0,f:+(document.getElementById("cf").value)||0,b:+(document.getElementById("cb").value)||0});
}

function rmv(i){entries.splice(i,1);sl();render();}
function clrLog(){if(confirm("Clear today's log?")){entries=[];sl();render();}}
function editGoals(){edGoals=true;renderGoals();}
function cancelGoals(){edGoals=false;renderGoals();}
function saveGoals(){
  ["calories","protein","carbs","fat","fiber"].forEach(function(k){
    var el=document.getElementById("gi-"+k);if(el)goals[k]=+el.value;
  });
  sg();edGoals=false;renderGoals();
}

render();
</script>
</body>
</html>
